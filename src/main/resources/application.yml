spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:routerdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  artemis:
    mode: native
    broker-url: tcp://${ARTEMIS_HOST:localhost}:${ARTEMIS_PORT:61616}
    user: ${ARTEMIS_USER:artemis}
    password: ${ARTEMIS_PASSWORD:}

  jms:
    listener:
      acknowledge-mode: auto
    pub-sub-domain: false

app:
  card-request-retry:
    cron: ${CARD_REQUEST_RETRY_CRON:0 */1 * * * *}
    batch-size: ${CARD_REQUEST_RETRY_BATCH_SIZE:100}
    lock-at-most-for: ${CARD_REQUEST_RETRY_LOCK_AT_MOST_FOR:PT5M}
    lock-at-least-for: ${CARD_REQUEST_RETRY_LOCK_AT_LEAST_FOR:PT10S}
